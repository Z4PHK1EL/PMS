<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Holy Cross Parish - Admin Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { background: #f8f9fa; }
    .admin-header { background: #1a5d1a; color: white; }
    .table thead { background: #1a5d1a; color: white; }
    .btn-resend { font-size: 0.85rem; }
    .img-thumbnail { height: 60px; object-fit: cover; }
  </style>
</head>
<body>

  <div class="container py-4">
    <div class="card shadow">
      <div class="card-header admin-header d-flex justify-content-between align-items-center">
        <h3 class="mb-0"><i class="fa-solid fa-users-gear me-2"></i>Admin Dashboard</h3>
        <button id="adminLogout" class="btn btn-outline-light">
          <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Logout
        </button>
      </div>
      <div class="card-body">
        <h5>Appointment Requests</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle" id="appointmentsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Service</th>
                <th>Date & Time</th>
                <th>Notes</th>
                <th>ID Photo</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="noAppointments" class="text-center py-5 text-muted">
          <h4>No appointments yet.</h4>
        </div>
      </div>
    </div>
  </div>

  <!-- Logout Success Modal -->
  <div class="modal fade" id="logoutSuccessModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5>Logged Out Successfully</h5>
        </div>
        <div class="modal-body text-center py-4">
          <p>Redirecting to home page...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <!-- Admin JS -->
  <script src="admin.js"></script>
</body>
</html>
